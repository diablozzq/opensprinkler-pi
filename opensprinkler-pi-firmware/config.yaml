name: "OpenSprinkler Pi Firmware"
version: "2.2.1"
slug: "opensprinkler_pi_firmware"
description: "OpenSprinkler Pi unified firmware as a Home Assistant add-on"
url: "https://github.com/OpenSprinkler/OpenSprinkler-Firmware"
arch:
  - armhf
  - aarch64
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "OpenSprinkler Pi web interface"
webui: "http://[HOST]:[PORT:8080]"
panel_icon: "mdi:sprinkler"
map:
  - share:rw
devices:
  - /dev/gpiomem
  - /dev/gpiochip0
  - /dev/gpiochip1
  - /dev/gpiochip2
  - /dev/gpiochip3
  - /dev/gpiochip4
  - /dev/i2c-1
  - /dev/i2c-0
gpio: true
privileged:
  - SYS_RAWIO
startup: application
boot: auto
init: false
options: {}
schema: {}